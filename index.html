<div class="anniversary" onclick="toggleAnniversary()">
    Since 16 May 2026 ❤️

<div id="anniversaryPopup">

```
<div class="popup-content">

    <span class="close-btn" onclick="toggleAnniversary()">

    <img src="16.jpg" class="anniversary-photo">

    <p class="anniversary-caption">
        The day you became mine ❤️

</div>
```

</div>

<div class="overlay">

```
<div class="container">

        <h1>For Bianca ❤️</h1>

        <div class="line"></div>

        <p class="subtitle">
            Open whenever you need me.
        </p>

        </p>

    </div>

    <div class="cards">

        <!-- Keep all your existing cards exactly as they are -->

    </div>

    <div class="footer">

        <div>
            <small>Favourite Person</small>
            <p>Bianca</p>
        </div>

        <div>
